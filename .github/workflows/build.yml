name: Build Leviathan Hunt APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        id: build
        continue-on-error: true
        run: |
          gradle android:assembleDebug --no-daemon --info --stacktrace 2>&1 | tee build-output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "BUILD_STATUS=fail" >> $GITHUB_OUTPUT
          else
            echo "BUILD_STATUS=success" >> $GITHUB_OUTPUT
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
          fi

      - name: Upload APK (on success)
        if: steps.build.outputs.BUILD_STATUS == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: LeviathanHunt-Android-${{ github.sha }}
          path: android/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Collect error details (on failure)
        if: steps.build.outputs.BUILD_STATUS == 'fail'
        id: errors
        run: |
          echo "## Build Failed" > error-report.md
          echo "**Commit:** ${{ github.sha }}" >> error-report.md
          echo "**Branch:** ${{ github.ref_name }}" >> error-report.md
          echo "**Run:** ${{ github.run_number }}" >> error-report.md
          echo "" >> error-report.md
          echo "### Error Summary" >> error-report.md
          echo '```' >> error-report.md
          grep -i "error\|FAILED\|Exception\|at " build-output.txt | tail -50 >> error-report.md 2>/dev/null
          echo '```' >> error-report.md
          echo "" >> error-report.md
          echo "### Full Build Log (last 100 lines)" >> error-report.md
          echo '```' >> error-report.md
          tail -100 build-output.txt >> error-report.md 2>/dev/null
          echo '```' >> error-report.md

      - name: Upload full build log (on failure)
        if: steps.build.outputs.BUILD_STATUS == 'fail'
        uses: actions/upload-artifact@v4
        with:
          name: Full-Build-Log-${{ github.sha }}
          path: |
            build-output.txt
            **/build/reports/**
            **/build/outputs/**/*.log
            **/build/*.log
          retention-days: 90

      - name: Upload error report (on failure)
        if: steps.build.outputs.BUILD_STATUS == 'fail'
        uses: actions/upload-artifact@v4
        with:
          name: Error-Report-${{ github.sha }}
          path: error-report.md
          retention-days: 90

      - name: Create GitHub Issue on failure
        if: steps.build.outputs.BUILD_STATUS == 'fail'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('error-report.md', 'utf8');
            const shortSha = '${{ github.sha }}'.substring(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build Failed: ${shortSha} — Leviathan Hunt APK`,
              body: report + '\n\n---\n_This issue was automatically created by GitHub Actions._\n\n@Nurmamatov404 please share this error with your AI assistant to fix the code.',
              labels: ['build-failure', 'auto-generated']
            });

      - name: Fail the job
        if: steps.build.outputs.BUILD_STATUS == 'fail'
        run: |
          echo "============================================"
          echo "  ❌ BUILD FAILED! ❌"
          echo "============================================"
          echo ""
          echo "  Error report uploaded as artifact: Error-Report-${{ github.sha }}"
          echo "  Full log uploaded as artifact: Full-Build-Log-${{ github.sha }}"
          echo "  GitHub Issue created automatically."
          echo ""
          echo "  Send the error to your AI assistant to fix."
          echo "============================================"
          exit 1

  release:
    name: Create Release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: LeviathanHunt-Android-${{ github.sha }}

      - name: Get short SHA
        id: slug
        run: echo "sha8=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}-${{ steps.slug.outputs.sha8 }}
          name: "Leviathan Hunt v1.0.${{ github.run_number }}"
          body: |
            ## Leviathan Hunt — Android Build

            - Commit: ${{ github.sha }}
            - Build: ${{ github.run_number }}

            ### How to install:
            1. Download the APK below
            2. Enable "Install from unknown sources"
            3. Install and play!

            ### Controls (touch):
            - **Left:** Virtual joystick for movement
            - **Right:** Action buttons (Ship: FIRE/HARP/TURBO/REP | Monster: 6 abilities)
            - **Monster vertical:** Swipe right side for depth
          files: |
            *.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
